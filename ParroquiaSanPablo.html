<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parroquia San Pablo</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom, #0b1f3a, #1e3a5f);
    }

    /* Animaciones suaves para scroll */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bounce {
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [mostrarAviso, setMostrarAviso] = React.useState(false);

  return (
    <div className="max-w-md mx-auto min-h-screen text-white">

      {/* 🔝 HEADER */}
      <div className="backdrop-blur-md bg-white/10 p-4 flex items-center shadow-lg fade-up">
        <button 
          onClick={() => window.location.href = "https://espadadelespiritu.github.io/"}
          className="mr-3 text-xl bounce"
        >
          ←
        </button>

        {/* Logo de la parroquia */}
        <img 
          src="https://mariavguadalupe.github.io/SanPablito.png" 
          className="w-10 h-10 mr-3 rounded-full bg-white p-1"
        />

        <div>
          <h1 className="text-xs font-bold leading-tight">
            Parroquia de San Pablo Apóstol
          </h1>
          <p className="text-[10px]">
            II Vicaria Diócesis de Texcoco A.R
          </p>
        </div>
      </div>

      {/* 📢 AVISOS ARRIBA */}
      <div className="p-3 fade-up" style={{animationDelay: "0.2s"}}>
        <div 
          className="rounded-2xl overflow-hidden shadow-xl cursor-pointer relative"
          onClick={() => setMostrarAviso(true)}
        >
          <img 
            src="https://espadadelespiritu.github.io/confesionescarta.png"
          />
          <div className="absolute inset-0 bg-black/40 flex items-end">
            <div className="p-3 text-white font-semibold text-center">
              Avisos parroquiales (toca para ver)
            </div>
          </div>
        </div>
      </div>

      {/* 📍 CONTENIDO */}
      <div className="p-3 space-y-4 fade-up" style={{animationDelay: "0.4s"}}>

        {/* INFORMACIÓN */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Información</h2>
          <p>Dirección: Calle Hidalgo esquina con Benito Juárez, San Pablito Calmimilolco Chiconcuac México C.P 56270</p>
          <p>Teléfono:</p>
        </div>

        {/* HORARIOS */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Horarios</h2>
          <p><b>Misa:</b> Domingo 8:00, 12:00, 19:00 HRS</p>
          <p><b>Confesiones y Hora Santa:</b> Jueves 5:00 PM</p>
          <p><b>Misa diaria:</b> 8:00 AM</p>
        </div>

        {/* PASTORALES */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Pastorales</h2>
          <ul className="list-disc ml-5">
            <li>Pastoral Juvenil</li>
            <li>Pastoral Familiar</li>
            <li>Catequesis</li>
            
          </ul>
        </div>

        {/* IMAGEN DEL TEMPLO */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-2 shadow-lg fade-up" style={{animationDelay:"0.6s"}}>
          <h2 className="font-bold mb-2 text-center">Imagen del Templo</h2>
          <img 
            src="https://mariavguadalupe.github.io/iglesia1.jpg" 
            className="w-full h-56 object-cover rounded-xl shadow-lg"
          />
        </div>

      </div>

      {/* 🗺️ MAPA ABAJO */}
      <div className="p-3 fade-up" style={{animationDelay:"0.8s"}}>
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-3 shadow-lg">
          <h2 className="font-bold mb-2">Ubicación</h2>
          <iframe
            className="w-full h-56 rounded-xl"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps/d/viewer?mid=1YIT-P8x7znCqBuBpO6VtmfxikfrU2SY&femb=1&ll=19.558381981233218%2C-98.90536518314703&z=15">
          </iframe>
        </div>
      </div>

      {/* 🔥 MODAL AVISO FULLSCREEN */}
      {mostrarAviso && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
          <button 
            onClick={() => setMostrarAviso(false)}
            className="text-white text-2xl p-4 absolute top-2 right-2">
            ✕
          </button>
          <img 
            src="https://espadadelespiritu.github.io/confesionescarta.png"
            className="max-h-[95vh] max-w-[95vw] object-contain rounded-lg shadow-2xl"
          />
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
