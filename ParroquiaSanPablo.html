<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Parroquia San Pablo</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (para JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">

function App() {

  const [mostrarAviso, setMostrarAviso] = React.useState(false);

  return (
    <div className="max-w-md mx-auto bg-white min-h-screen shadow">

      {/* 🔝 HEADER */}
      <div className="bg-blue-900 text-white p-4 flex items-center">
        <button 
          onClick={() => window.location.href = "https://espadadelespiritu.github.io/"}
          className="mr-3 text-xl">
          ←
        </button>

        <div>
          <h1 className="text-sm font-bold leading-tight">
            Parroquia de San Pablo Apóstol
          </h1>
          <p className="text-xs">
            II Vicaria Diócesis de Texcoco A.R
          </p>
        </div>
      </div>

      {/* 🖼️ LOGO */}
      <div className="text-center p-4">
        <img src="logo.png" className="mx-auto w-24"/>
      </div>

      {/* 📍 INFO */}
      <div className="p-4">
        <div className="bg-white rounded-xl shadow p-4 mb-4">
          <h2 className="font-bold mb-2">Información</h2>
          <p>Dirección: Texcoco, Estado de México</p>
          <p>Teléfono: 55 0000 0000</p>
        </div>

        {/* 🗺️ MAPA */}
        <div className="bg-white rounded-xl shadow p-4 mb-4">
          <h2 className="font-bold mb-2">Ubicación</h2>
          <iframe
            className="w-full h-56 rounded-xl"
            src="https://www.google.com/maps?q=Texcoco&output=embed"
          ></iframe>
        </div>

        {/* ⛪ HORARIOS */}
        <div className="bg-white rounded-xl shadow p-4 mb-4">
          <h2 className="font-bold mb-2">Horarios</h2>
          <p><b>Misa:</b> Domingo 8:00, 10:00, 12:00</p>
          <p><b>Confesiones:</b> Sábado 5:00 PM</p>
          <p><b>Hora Santa:</b> Jueves 6:00 PM</p>
        </div>

        {/* 🙏 PASTORALES */}
        <div className="bg-white rounded-xl shadow p-4 mb-4">
          <h2 className="font-bold mb-2">Pastorales</h2>
          <ul className="list-disc ml-4">
            <li>Pastoral Juvenil</li>
            <li>Pastoral Familiar</li>
            <li>Catequesis</li>
            <li>Grupo de Oración</li>
          </ul>
        </div>

        {/* 📢 AVISOS */}
        <div 
          className="rounded-xl overflow-hidden shadow cursor-pointer"
          onClick={() => setMostrarAviso(true)}
        >
          <img src="aviso.jpg" className="w-full h-48 object-cover"/>
          <div className="bg-black bg-opacity-60 text-white p-2 text-center">
            Avisos parroquiales (tocar)
          </div>
        </div>

      </div>

      {/* 🔥 MODAL FULLSCREEN */}
      {mostrarAviso && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col">

          <button 
            onClick={() => setMostrarAviso(false)}
            className="text-white text-2xl p-4 self-end">
            ✕
          </button>

          <img 
            src="aviso.jpg" 
            className="w-full h-full object-contain"
          />

        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
