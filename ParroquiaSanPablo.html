<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Parroquia San Pablo</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom, #0b1f3a, #1e3a5f);
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App() {

  const [mostrarAviso, setMostrarAviso] = React.useState(false);

  return (
    <div className="max-w-md mx-auto min-h-screen text-white">

      {/* 🔝 HEADER CON LOGO */}
      <div className="backdrop-blur-md bg-white/10 p-4 flex items-center shadow-lg">

        <button 
          onClick={() => window.location.href = "https://espadadelespiritu.github.io/"}
          className="mr-3 text-xl">
          ←
        </button>

        {/* Logo público */}
        <img 
          src="https://cdn-icons-png.flaticon.com/512/3176/3176363.png"
          className="w-10 h-10 mr-3 rounded-full bg-white p-1"
        />

        <div>
          <h1 className="text-xs font-bold leading-tight">
            Parroquia de San Pablo Apóstol
          </h1>
          <p className="text-[10px]">
            II Vicaria Diócesis de Texcoco A.R
          </p>
        </div>

      </div>

      {/* 📢 AVISOS ARRIBA */}
      <div className="p-3">
        <div 
          className="rounded-2xl overflow-hidden shadow-xl cursor-pointer relative"
          onClick={() => setMostrarAviso(true)}
        >
          <img 
            src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65"
            className="w-full h-44 object-cover"
          />

          <div className="absolute inset-0 bg-black/40 flex items-end">
            <div className="p-3 text-white font-semibold">
              Avisos parroquiales (toca para ver)
            </div>
          </div>
        </div>
      </div>

      {/* 📍 CONTENIDO */}
      <div className="p-3 space-y-4">

        {/* INFO */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Información</h2>
          <p>Dirección: Texcoco, Estado de México</p>
          <p>Teléfono: 55 0000 0000</p>
        </div>

        {/* HORARIOS */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Horarios</h2>
          <p><b>Misa:</b> Domingo 8:00, 10:00, 12:00</p>
          <p><b>Confesiones:</b> Sábado 5:00 PM</p>
          <p><b>Hora Santa:</b> Jueves 6:00 PM</p>
        </div>

        {/* PASTORALES */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Pastorales</h2>
          <ul className="list-disc ml-5">
            <li>Pastoral Juvenil</li>
            <li>Pastoral Familiar</li>
            <li>Catequesis</li>
            <li>Grupo de Oración</li>
          </ul>
        </div>

        {/* GALERÍA BONITA */}
        <div className="grid grid-cols-2 gap-3">
          <img src="https://images.unsplash.com/photo-1548625149-fc4a29cf7092" className="rounded-xl h-32 object-cover"/>
          <img src="https://images.unsplash.com/photo-1507692049790-de58290a4334" className="rounded-xl h-32 object-cover"/>
        </div>

      </div>

      {/* 🗺️ MAPA ABAJO */}
      <div className="p-3">
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-3 shadow-lg">
          <h2 className="font-bold mb-2">Ubicación</h2>

          <iframe
            className="w-full h-56 rounded-xl"
            src="https://www.google.com/maps?q=Texcoco&output=embed"
          ></iframe>
        </div>
      </div>

      {/* 🔥 MODAL AVISO FULLSCREEN */}
      {mostrarAviso && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col">

          <button 
            onClick={() => setMostrarAviso(false)}
            className="text-white text-2xl p-4 self-end">
            ✕
          </button>

          <img 
            src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65"
            className="w-full h-full object-contain"
          />

        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
