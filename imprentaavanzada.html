<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Imprenta PDF Avanzada</title>
<style>
body { font-family: Arial; text-align:center; padding:20px; background:#f4f4f4; }
.box { background:white; padding:20px; border-radius:10px; max-width:550px; margin:auto; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
button { padding:10px 20px; margin-top:10px; background:#007bff; color:white; border:none; border-radius:8px; cursor:pointer; }
button:hover { background:#0056b3; }
#status { margin-top: 15px; font-weight:bold; }
</style>
</head>
<body>

<h1>📚 Imprenta PDF Avanzada</h1>
<div class="box">
  <input type="file" id="pdfFile" accept="application/pdf"><br>
  <button onclick="processPDF()">Generar PDF</button>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
async function processPDF() {
  const status = document.getElementById("status");
  status.textContent = "Procesando PDF…";

  const file = document.getElementById('pdfFile').files[0];
  if(!file) {
    status.textContent = "❌ Por favor sube un PDF.";
    return;
  }

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;

    let pages = [];
    for(let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({scale:2});
      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const context = canvas.getContext("2d");
      await page.render({canvasContext:context, viewport}).promise;
      pages.push(canvas.toDataURL("image/jpeg"));
    }

    // Si número de páginas impar, agregar una hoja en blanco al final
    if(pages.length % 2 !== 0) pages.push(null);

    // Insertar hoja en blanco para portada/contraportada si quieres portada separada
    // Aquí combinaremos la primera (portada) y última (contraportada) en la primera hoja
    if(pages.length >= 2){
      const portada = pages.shift(); // primera página
      const contraportada = pages.pop(); // última página
      pages.unshift(contraportada, portada); // se colocan juntas al inicio
    }

    await generateOutput(pages);
    status.textContent = "✅ PDF generado correctamente.";
  } catch(err) {
    console.error(err);
    status.textContent = "❌ Error procesando el PDF.";
  }
}

async function generateOutput(pages){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:"landscape", unit:"mm", format:"letter"});
  
  const pageW = 279, pageH = 216;
  const half = pageW/2;
  const margin = 5; // margen reducido para aprovechar más el área

  for(let i=0; i<pages.length; i+=2){
    if(pages[i]) await drawImage(pdf, pages[i], 0, half, pageH, margin);
    if(pages[i+1]) await drawImage(pdf, pages[i+1], half, half, pageH, margin);
    if(i+2 < pages.length) pdf.addPage();
  }

  pdf.save("imprenta_avanzada.pdf");
}

function drawImage(pdf, imgData, offsetX, areaW, areaH, margin){
  return new Promise((resolve, reject) => {
    if(!imgData) return resolve(); // hoja en blanco
    const img = new Image();
    img.onload = () => {
      try {
        const ratio = Math.min((areaW-margin*2)/img.width, (areaH-margin*2)/img.height);
        const w = img.width * ratio;
        const h = img.height * ratio;
        const x = offsetX + (areaW - w)/2;
        const y = (areaH - h)/2;
        pdf.addImage(imgData, "JPEG", x, y, w, h);
        resolve();
      } catch(e) { reject(e); }
    };
    img.onerror = () => reject(new Error("Error cargando la imagen"));
    img.src = imgData;
  });
}
</script>

</body>
</html>
